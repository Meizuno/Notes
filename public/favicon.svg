<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background gradient: indigo → violet, matches the
       knowledge-graph aesthetic and stays distinct from the
       recipes-book orange branding. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Edges between central hub and four satellite nodes.
       Stroke wide enough to read at 16px favicon size. -->
  <g stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <line x1="90" y1="90" x2="48"  y2="48"/>
    <line x1="90" y1="90" x2="132" y2="48"/>
    <line x1="90" y1="90" x2="42"  y2="132"/>
    <line x1="90" y1="90" x2="138" y2="132"/>
  </g>

  <!-- Satellite nodes -->
  <circle cx="48"  cy="48"  r="13" fill="#fff" fill-opacity="0.92"/>
  <circle cx="132" cy="48"  r="13" fill="#fff" fill-opacity="0.92"/>
  <circle cx="42"  cy="132" r="13" fill="#fff" fill-opacity="0.92"/>
  <circle cx="138" cy="132" r="13" fill="#fff" fill-opacity="0.92"/>

  <!-- Central hub: largest, fully opaque so it stays the
       focal point at small sizes. -->
  <circle cx="90" cy="90" r="20" fill="#fff"/>
</svg>
